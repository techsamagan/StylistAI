# ASANUR — dev access control (macOS pf packet filter)
# Restricts the dev ports 3000 (frontend) and 8000 (backend) so they are
# reachable ONLY from this machine and 10.0.0.116. All other hosts on the
# network are blocked from those two ports. Everything else is untouched.
#
#   ENABLE :  sudo pfctl -f /Users/samagannurdinov/Desktop/StylistAI/asanur-dev.pf.conf -E
#   STATUS :  sudo pfctl -s rules
#   REVERT :  sudo pfctl -d            # disables pf, restores open access
#
# Note: pf resets to /etc/pf.conf on reboot, so this is non-permanent by design.

# Loopback (127.0.0.1 / ::1) is always allowed — "me" on this machine.
set skip on lo0

# The only remote hosts allowed to reach the dev ports.
table <asanur_allowed> persist { 10.0.0.32, 10.0.0.116 }

# Block inbound to the dev ports from anyone NOT in the allowlist, and stop.
block drop in quick proto tcp from ! <asanur_allowed> to any port { 3000, 8000 }

# Don't disturb any other traffic on the machine.
pass all
